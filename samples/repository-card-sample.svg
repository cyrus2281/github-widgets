<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">
  <!-- Created By GitHub Widgets - Authored by cyrus2281 -->
  <!-- Github: https://github.com/cyrus2281/github-widgets -->
  <defs>
    <!-- Drop shadow filter -->
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Gradient for border -->
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c5cff;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(var(--slide-in-offset, 0px)); }
    }
    
    .repo-card {
      animation: fadeIn 0.6s ease-out forwards;
    }
    
    .repo-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      animation: slideIn 0.6s ease-out forwards 0.1s;
      opacity: 0;
    }
    
    .repo-icon {
      animation: fadeIn 0.6s ease-out forwards 0.2s;
      opacity: 0;
    }
    
    .stat-item {
      animation: slideIn 0.5s ease-out forwards;
      opacity: 0;
    }
    
    .stat-item-1 { animation-delay: 0.3s; }
    .stat-item-2 { animation-delay: 0.4s; }
    .stat-item-3 { animation-delay: 0.5s; }
    
    .stat-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
    }
    
    .language-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 400;
    }
    
    .repo-description {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 400;
      animation: slideIn 0.6s ease-out forwards 0.2s;
      opacity: 0;
    }
  </style>
  
  <!-- Card background with shadow -->
  <g class="repo-card">
    <rect x="0" y="0" width="400" height="120"
          fill="#0f1724" rx="8"
          stroke="url(#borderGradient)" stroke-width="1"
          filter="url(#cardShadow)"/>
    
    <!-- Repository icon -->
    <g class="repo-icon" transform="translate(16, 20)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="#94a3b8">
        <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"/>
      </svg>
    </g>
    
    <!-- Repository name -->
    <text x="40" y="32" fill="#fe428e" class="repo-name">
      cyrus2281/github-widgets
    </text>
    
    
    <!-- Repository description -->
    <g class="repo-description">
      
      <text x="16" y="55" fill="#94a3b8">
        A serverless app for github widgets
      </text>
    </g>
    
    
    <!-- Stats section -->
    <g transform="translate(16, 88)">
      
      <!-- Language -->
      <g class="stat-item stat-item-1" style="--slide-in-offset: 0px">
        <circle cx="6" cy="6" r="6" fill="#f1e05a"/>
        <text x="18" y="10" fill="#cbd5e1" class="language-text">
          JavaScript
        </text>
      </g>
      
      
      
      <!-- Stars -->
      <g class="stat-item stat-item-2" style="--slide-in-offset: 120px" transform="translate(120, 0)">
        <svg x="0" y="-2" width="14" height="14" viewBox="0 0 16 16" fill="#ffd600">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
        </svg>
        <text x="20" y="10" fill="#cbd5e1" class="stat-text">
          36
        </text>
      </g>
      
      
      
      <!-- Forks -->
      <g class="stat-item stat-item-3" style="--slide-in-offset: 190px" transform="translate(190, 0)">
        <svg x="0" y="-2" width="14" height="14" viewBox="0 0 16 16" fill="#94a3b8">
          <path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75v-.878a2.25 2.25 0 1 1 1.5 0v.878a2.25 2.25 0 0 1-2.25 2.25h-1.5v2.128a2.251 2.251 0 1 1-1.5 0V8.5h-1.5A2.25 2.25 0 0 1 3.5 6.25v-.878a2.25 2.25 0 1 1 1.5 0ZM5 3.25a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Zm6.75.75a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm-3 8.75a.75.75 0 1 0-1.5 0 .75.75 0 0 0 1.5 0Z"/>
        </svg>
        <text x="20" y="10" fill="#cbd5e1" class="stat-text">
          12
        </text>
      </g>
      
    </g>
  </g>
</svg>