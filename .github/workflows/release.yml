name: Release to Docker Hub

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    branches:
      - main

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version_type: ${{ steps.detect.outputs.version_type }}
      should_release: ${{ steps.detect.outputs.should_release }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect version type from commit
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version_type=${{ github.event.inputs.version_type }}" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            COMMIT_MSG=$(git log -1 --pretty=%s)
            echo "Commit message: $COMMIT_MSG"
            if echo "$COMMIT_MSG" | grep -qE '^[a-z]+(\(.+\))?!:'; then
              echo "Detected: major (breaking change)"
              echo "version_type=major" >> $GITHUB_OUTPUT
              echo "should_release=true" >> $GITHUB_OUTPUT
            elif echo "$COMMIT_MSG" | grep -qE '^feat(\(.+\))?:'; then
              echo "Detected: minor (new feature)"
              echo "version_type=minor" >> $GITHUB_OUTPUT
              echo "should_release=true" >> $GITHUB_OUTPUT
            elif echo "$COMMIT_MSG" | grep -qE '^fix(\(.+\))?:'; then
              echo "Detected: patch (bug fix)"
              echo "version_type=patch" >> $GITHUB_OUTPUT
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "No release needed for this commit type"
              echo "version_type=none" >> $GITHUB_OUTPUT
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

  release:
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump npm version
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ needs.detect-version.outputs.version_type }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${NEW_VERSION#v}" >> $GITHUB_OUTPUT

      - name: Create npm package artifact
        run: npm pack

      - name: Commit version bump and create tag
        run: |
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.new_version }}
          git push origin main
          git push origin ${{ steps.version.outputs.new_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.new_version }}
          tags: |
            cyrus2281/github-widgets:latest
            cyrus2281/github-widgets:${{ steps.version.outputs.new_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          name: Release ${{ steps.version.outputs.new_version }}
          body: |
            ## GitHub Widgets ${{ steps.version.outputs.new_version }}

            ### Docker Images
            This release is available as a multi-platform Docker image (linux/amd64, linux/arm64):

            ```bash
            docker pull cyrus2281/github-widgets:${{ steps.version.outputs.new_version }}
            # or
            docker pull cyrus2281/github-widgets:latest
            ```

            🐳 **Docker Hub**: https://hub.docker.com/r/cyrus2281/github-widgets

            ### npm Package
            The npm package is attached as an artifact below.
          files: github-widgets-${{ steps.version.outputs.version_number }}.tgz
          token: ${{ secrets.GITHUB_TOKEN }}
